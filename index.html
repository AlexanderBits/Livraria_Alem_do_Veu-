<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Além do Véu — Cler Editora</title>
    <meta name="description" content="Livraria Além do Véu — Parceira Cler Editora. Descubra mundos além do véu das páginas." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://js.stripe.com/v3/"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['Playfair Display', 'serif'],
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              navy: {
                50: '#eef2ff',
                100: '#e0e7ff',
                200: '#c7d2fe',
                300: '#a5b4fc',
                400: '#818cf8',
                500: '#6366f1',
                600: '#4f46e5',
                700: '#4338ca',
                800: '#1e1b4b',
                900: '#0f0d2e',
                950: '#080720',
              },
              gold: {
                300: '#fcd34d',
                400: '#fbbf24',
                500: '#f59e0b',
                600: '#d97706',
              },
            },
            animation: {
              'fade-up': 'fadeUp 0.6s ease-out forwards',
              'shimmer': 'shimmer 2s linear infinite',
            },
            keyframes: {
              fadeUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              },
            },
          },
        },
      }
    </script>
    <style>
      * { box-sizing: border-box; }
      body { background: #080720; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0f0d2e; }
      ::-webkit-scrollbar-thumb { background: #4338ca; border-radius: 3px; }
      .gold-gradient { background: linear-gradient(135deg, #fbbf24, #f59e0b, #d97706); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
      .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
      .book-card:hover .book-overlay { opacity: 1; }
      .book-card:hover { transform: translateY(-8px); }
      .book-card { transition: transform 0.3s ease; }
      .book-overlay { opacity: 0; transition: opacity 0.3s ease; }
      .hero-glow { background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99,102,241,0.3), transparent); }
      .cart-badge { animation: pop 0.2s ease; }
      @keyframes pop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
      .nav-link { position: relative; }
      .nav-link::after { content:''; position:absolute; bottom:-2px; left:0; width:0; height:1px; background: linear-gradient(90deg,#fbbf24,#f59e0b); transition: width 0.3s ease; }
      .nav-link:hover::after { width: 100%; }
      input, select { outline: none; }
      input:focus, select:focus { border-color: rgba(99,102,241,0.6) !important; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "framer-motion": "https://aistudiocdn.com/framer-motion@^12.23.24",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0"
  }
}
</script>
</head>
  <body class="font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
